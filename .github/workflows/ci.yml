name: CI

on: push

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Prebuilt binary (no source compile) + cached binary and lint cache.
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Test
        run: go test -cover ./...
